
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#050505">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2220%22 fill=%22%23050505%22/><text x=%2250%22 y=%2270%22 font-family=%22serif%22 font-weight=%22bold%22 font-size=%2270%22 text-anchor=%22middle%22 fill=%22%23B59A6D%22>F</text></svg>">
    <title>Forte-FY | For a Fortunate Future</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,400&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand-accent: #B59A6D;
            --brand-dark: #050505;
            --brand-text: #E0DCD3;
        }
        
        html {
            font-size: 16px;
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', sans-serif !important;
            background-color: var(--brand-dark) !important;
            color: var(--brand-text) !important;
            overflow-x: hidden;
            width: 100%;
            line-height: 1.8;
            -webkit-font-smoothing: antialiased;
        }
        
        /* Global Theme Overrides for Museum Vibe */
        
        /* Override old dark backgrounds to transparent so the body color shows through */
        .bg-zinc-950, .bg-zinc-900, .bg-zinc-800, .bg-slate-900, .bg-slate-950,
        .from-zinc-950, .via-zinc-950, .to-zinc-950, .from-slate-900, .via-slate-900, .to-slate-900 {
            background-color: transparent !important;
            background-image: none !important;
        }

        /* Override old light backgrounds to dark */
        .bg-slate-100, .bg-slate-50, .bg-slate-200, .bg-slate-300, .bg-slate-400, .bg-zinc-100, .bg-zinc-200, .bg-zinc-300,
        .from-slate-100, .via-slate-100, .to-slate-100, .from-slate-50, .via-slate-50, .to-slate-50, .from-white, .via-white, .to-white {
            background-color: transparent !important;
            background-image: none !important;
        }

        /* Specific override for bg-white to make buttons visible */
        .bg-white {
            background-color: var(--brand-text) !important;
            color: var(--brand-dark) !important;
        }

        /* Override old borders to be borderless or very subtle */
        .border, .border-t, .border-b, .border-l, .border-r, .border-slate-200, .border-slate-300, .border-white\/5, .border-white\/10, .border-white\/20, .border-white\/30 {
            border-color: transparent !important;
        }

        /* Override old accent colors (cyan/blue) to new accent (gold) */
        .text-\[\#00f7ff\], .text-\[\#0066cc\], .text-cyan-500, .text-cyan-400, .text-cyan-300, .text-blue-500, .text-blue-600, .text-blue-100 {
            color: var(--brand-accent) !important;
        }
        .bg-\[\#00f7ff\], .bg-\[\#0066cc\], .bg-cyan-500, .bg-blue-500, .bg-blue-600 {
            background-color: var(--brand-accent) !important;
            color: var(--brand-dark) !important;
        }
        .border-\[\#00f7ff\], .border-\[\#0066cc\], .border-cyan-500 {
            border-color: var(--brand-accent) !important;
        }

        /* Override old text colors to match the new palette */
        .text-slate-900, .text-slate-800, .text-slate-700, .text-slate-600, .text-slate-500, .text-slate-400, .text-zinc-900, .text-zinc-800, .text-zinc-700, .text-zinc-600, .text-zinc-500, .text-zinc-400, .text-zinc-300, .text-zinc-200, .text-white {
            color: var(--brand-text) !important;
        }

        .text-black {
            color: var(--brand-dark) !important;
        }

        /* Typography Overrides */
        .font-heading, h1, h2, h3, h4, h5, h6 {
            font-family: 'Playfair Display', serif !important;
            font-weight: 600 !important;
            text-transform: none !important;
            font-style: normal !important;
            letter-spacing: -0.02em !important;
        }

        .font-body, p, span, div, a, button {
            font-family: 'Inter', sans-serif;
        }
        
        /* Justify text globally for paragraphs */
        p {
            text-align: justify;
            font-size: 1.125rem !important; /* Increase base font size */
        }

        /* Prevent oversized fonts but keep them readable */
        .text-8xl, .text-\[10rem\], .text-7xl, .text-6xl {
            font-size: 4rem !important;
            line-height: 1.1 !important;
        }
        .text-5xl, .text-4xl {
            font-size: 3rem !important;
            line-height: 1.2 !important;
        }

        /* Remove aggressive tracking and uppercase */
        .tracking-tighter, .tracking-tight, .tracking-widest, .tracking-\[0\.4em\], .tracking-\[0\.5em\], .tracking-\[0\.8em\], .tracking-\[1\.2em\], .tracking-\[0\.2em\], .tracking-\[0\.3em\], .tracking-\[0\.15em\], .tracking-\[0\.1em\] {
            letter-spacing: normal !important;
        }
        .uppercase {
            text-transform: none !important;
        }
        .italic {
            font-style: normal !important;
        }
        .font-black, .font-bold {
            font-weight: 500 !important;
        }

        /* Round edges for everything */
        .rounded-none, .rounded-sm, .rounded, .rounded-md, .rounded-lg, .rounded-xl, .rounded-2xl, .rounded-3xl, .rounded-\[2rem\], .rounded-\[3rem\], .rounded-\[1\.5rem\], .rounded-\[2\.5rem\], .rounded-\[1\.2rem\] {
            border-radius: 2rem !important;
        }

        /* Images should be black and white by default, color on hover. Responsive sizing. */
        img {
            filter: grayscale(100%) !important;
            transition: filter 1s ease, transform 1s ease !important;
            border-radius: 1.5rem !important;
            max-width: 100% !important;
            height: auto !important;
            object-fit: cover !important;
        }
        img:hover {
            filter: grayscale(0%) !important;
            transform: scale(1.02) !important;
        }
        
        /* Limit image size globally to prevent "too big" images */
        .w-full > img {
            max-height: 80vh !important;
            width: auto !important;
            margin: 0 auto !important;
        }

        /* Glass panels should be subtle */
        .glass, .bg-white\/\[0\.01\], .bg-white\/\[0\.02\], .bg-white\/\[0\.03\], .bg-white\/5, .bg-white\/10, .bg-black\/20 {
            background: rgba(224, 220, 211, 0.02) !important;
            backdrop-filter: blur(10px) !important;
            border: none !important;
            box-shadow: none !important;
        }

        /* Subtle moving background */
        @keyframes slow-drift {
            0% { transform: translate(0%, 0%) scale(1); opacity: 0.3; }
            50% { transform: translate(2%, 3%) scale(1.05); opacity: 0.5; }
            100% { transform: translate(-1%, 2%) scale(1); opacity: 0.3; }
        }
        .bg-blob {
            position: fixed;
            top: -20%; left: -10%; width: 140%; height: 140%;
            background: radial-gradient(circle at 50% 50%, rgba(181, 154, 109, 0.05) 0%, rgba(5, 5, 5, 0) 60%);
            animation: slow-drift 25s infinite alternate ease-in-out;
            pointer-events: none;
            z-index: -1;
        }

        ::selection {
            background-color: var(--brand-accent);
            color: var(--brand-dark);
        }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: var(--brand-dark); }
        ::-webkit-scrollbar-thumb { background: #222; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--brand-accent); }
        
        @keyframes fade-in {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-fade-in {
            animation: fade-in 0.5s ease-out forwards;
        }

        /* Mobile specific adjustments */
        @media (max-width: 640px) {
            .glass {
                backdrop-filter: blur(10px) !important;
            }
        }

        /* Hero Overlay Fix */
        .group\\/hero .absolute.inset-0.z-0::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, rgba(5,5,5,0.4), rgba(5,5,5,0.9));
            pointer-events: none;
        }

        /* PRINT FRIENDLY CSS */
        @media print {
            nav, button, footer, .glass::before, .bg-blob {
                display: none !important;
            }
            
            body {
                background-color: #000000 !important;
                color: #ffffff !important;
                print-color-adjust: exact;
                -webkit-print-color-adjust: exact;
            }

            * {
                box-shadow: none !important;
                text-shadow: none !important;
            }

            section {
                page-break-after: always;
                border: none !important;
            }

            h1, h2, h3, h4 {
                color: #B59A6D !important;
            }

            .glass {
                background: none !important;
                border: 1px solid #333 !important;
            }

            img {
                filter: none !important;
                grayscale: 0 !important;
            }
        }
    </style>

</script>
</head>
<body class="overflow-x-hidden">
    <div class="bg-blob"></div>
    <div id="root"></div>

</html>
